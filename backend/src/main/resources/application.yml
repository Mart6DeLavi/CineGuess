server:
  port: ${SERVER_PORT:8080}
  error:
    include-message: always

spring:
  application:
    name: cineguess-backend
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/cineguess}
    username: ${SPRING_R2DBC_USERNAME:cineguess}
    password: ${SPRING_R2DBC_PASSWORD:cineguess}
  flyway:
    enabled: true
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/cineguess}
    user: ${SPRING_FLYWAY_USER:cineguess}
    password: ${SPRING_FLYWAY_PASSWORD:cineguess}
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

tmdb:
  base-url: ${TMDB_BASE_URL:https://api.themoviedb.org/3}
  api-key: ${TMDB_API_KEY:}

app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173}
