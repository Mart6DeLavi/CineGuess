services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: cineguess
      POSTGRES_USER: cineguess
      POSTGRES_PASSWORD: cineguess
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cineguess -d cineguess"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      SPRING_R2DBC_URL: r2dbc:postgresql://postgres:5432/cineguess
      SPRING_R2DBC_USERNAME: cineguess
      SPRING_R2DBC_PASSWORD: cineguess
      SPRING_FLYWAY_URL: jdbc:postgresql://postgres:5432/cineguess
      SPRING_FLYWAY_USER: cineguess
      SPRING_FLYWAY_PASSWORD: cineguess
      SPRING_REDIS_HOST: redis
      TMDB_API_KEY: ${TMDB_API_KEY:-}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres-data:
